[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# ── SPA routing ──
# Static assets (JS, CSS, images, JSON data) are served directly.
# Everything else routes to index.html for client-side routing.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Stripe webhook needs direct access (no SPA redirect)
[[redirects]]
  from = "/api/stripe-webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200

[[redirects]]
  from = "/api/create-checkout"
  to = "/.netlify/functions/create-checkout"
  status = 200

[[redirects]]
  from = "/api/billing-portal"
  to = "/.netlify/functions/billing-portal"
  status = 200

# ── Security headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# ── Cache: static data files (tag genome, PCA, bundles) ──
# These change only on rebuild, so cache aggressively.
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

# ── Cache: hashed JS/CSS assets (Vite adds content hash) ──
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
